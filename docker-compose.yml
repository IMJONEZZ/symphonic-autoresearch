services:
  symphonic-autoresearch:
    build: .
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      # HuggingFace cache (datasets, models)
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      # OpenCode binary and runtime
      - ${HOME}/.opencode:/root/.opencode
      # OpenCode configuration (providers, agents, rules)
      - ${HOME}/.config/opencode:/root/.config/opencode
      # Optional: NAS storage (remove if not needed)
      # - /mnt/nas:/mnt/nas
      # Persist workspace across restarts
      - symphonic-autoresearch-workspaces:/root/symphonic-autoresearch-workspaces
      # Persist autoresearch cache (tokenizer, data shards)
      - autoresearch_cache:/root/.cache/autoresearch
    environment:
      - PATH=/root/.opencode/bin:/root/.local/bin:/usr/local/bin:/usr/bin:/bin
      - NVIDIA_VISIBLE_DEVICES=all
    working_dir: /workspace

volumes:
  symphonic-autoresearch-workspaces:
  autoresearch_cache:
